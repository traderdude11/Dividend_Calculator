<!DOCTYPE html>
<html>
<head>
  <title>Dividend Capture Pro+</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial;
      max-width: 1100px;
      margin: auto;
      padding: 20px;
      background: #f4f6f9;
    }
    h2 { text-align: center; }
    input {
      width: 100%;
      padding: 8px;
      margin: 5px 0;
    }
    button {
      padding: 10px;
      width: 100%;
      background: #28a745;
      color: white;
      border: none;
      margin-top: 10px;
      font-size: 16px;
    }
    table {
      width: 100%;
      margin-top: 20px;
      border-collapse: collapse;
      background: white;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: center;
    }
    th {
      background: #007bff;
      color: white;
    }
    .profit { color: green; font-weight: bold; }
    .loss { color: red; font-weight: bold; }
    .warn { color: orange; font-weight: bold; }
    .summary {
      margin-top: 20px;
      padding: 15px;
      background: white;
    }
  </style>
</head>

<body>

<h2>📊 Dividend Capture Pro+</h2>

<input type="date" id="exDate">
<input type="text" id="company" placeholder="Company Name">
<input type="number" id="investment" placeholder="Investment ₹">
<input type="number" id="dividend" placeholder="Dividend ₹">
<input type="number" id="buyPrice" placeholder="Buy Price">
<input type="number" id="sellPrice" placeholder="Sell Price">

<button onclick="addTrade()">Add Trade</button>

<table id="table">
  <tr>
    <th>Date</th>
    <th>Company</th>
    <th>Shares</th>
    <th>Dividend</th>
    <th>Trading Loss</th>
    <th>Total Tax</th>
    <th>Break-even Price</th>
    <th>Verdict</th>
    <th>Final P/L</th>
  </tr>
</table>

<div class="summary">
  <h3>📈 Portfolio Summary</h3>
  <p>Total Investment: ₹<span id="totalInv">0</span></p>
  <p>Total Profit: ₹<span id="totalProfit">0</span></p>
</div>

<script>
let totalInvestment = 0;
let totalProfit = 0;

function addTrade() {
  let date = document.getElementById("exDate").value;
  let company = document.getElementById("company").value;
  let investment = parseFloat(document.getElementById("investment").value);
  let dividend = parseFloat(document.getElementById("dividend").value);
  let buyPrice = parseFloat(document.getElementById("buyPrice").value);
  let sellPrice = parseFloat(document.getElementById("sellPrice").value);

  if (!investment || !buyPrice) return alert("Enter valid inputs");

  let shares = investment / buyPrice;
  let payout = shares * dividend;
  let investmentBefore = shares * buyPrice;
  let investmentAfter = shares * sellPrice;
  let tradingPL = investmentBefore - investmentAfter;
  
  let tradingTax = tradingPL > 0 ? tradingPL * 0.20 : 0;
  let dividendTax = payout * 0.30;
  let totalTax = tradingTax + dividendTax;
  let totalPL = payout - tradingPL;
  let finalPL = totalPL - totalTax;
  
  let breakEvenPrice = buyPrice - (dividend * (1 - 0.30));

  let verdict = "";
  let verdictClass = "";
  
  if (finalPL > 0) {
    verdict = "Profitable ✅";
    verdictClass = "profit";
  } else if (finalPL > -1000) {
    verdict = "Risky ⚠️";
    verdictClass = "warn";
  } else {
    verdict = "Avoid ❌";
    verdictClass = "loss";
  }

  let table = document.getElementById("table");
  let row = table.insertRow();
  row.innerHTML = `
    <td>${date}</td>
    <td>${company}</td>
    <td>${shares.toFixed(2)}</td>
    <td>₹${payout.toFixed(2)}</td>
    <td>₹${tradingPL.toFixed(2)}</td>
    <td>₹${totalTax.toFixed(2)}</td>
    <td>₹${breakEvenPrice.toFixed(2)}</td>
    <td class="${verdictClass}">${verdict}</td>
    <td class="${finalPL>=0?'profit':'loss'}">₹${finalPL.toFixed(2)}</td>
  `;

  totalInvestment += investment;
  totalProfit += finalPL;

  document.getElementById("totalInv").innerText = totalInvestment.toFixed(2);
  document.getElementById("totalProfit").innerText = totalProfit.toFixed(2);
}
</script>

</body>
</html>
