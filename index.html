<!DOCTYPE html>
<html>
<head>
  <title>Dividend Intelligence Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1e293b, #0f172a);
      color: white;
      margin: 0;
      padding: 20px;
    }

    .container { max-width: 1200px; margin: auto; }

    h1 { text-align: center; margin-bottom: 20px; }

    .kpi {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 15px;
      border-radius: 15px;
    }

    .form {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
      margin-bottom: 20px;
    }

    input {
      padding: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #22c55e;
      padding: 10px;
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 15px;
    }

    .stock-card {
      background: rgba(255,255,255,0.05);
      padding: 15px;
      border-radius: 15px;
      transition: 0.3s;
    }

    .stock-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }

    .profit { color: #22c55e; }
    .loss { color: #ef4444; }

    .tag {
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 12px;
    }

    .high { background: #16a34a; }
    .mid { background: #f59e0b; }
    .low { background: #ef4444; }

    .actions {
      display: flex;
      gap: 5px;
      margin-top: 10px;
    }

    #amountWords {
      font-size: 12px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

<div style="display: flex; gap: 20px; margin-bottom: 20px;">
  <div style="flex: 1;">
    <div class="form">
      <div style="grid-column: 1;">
        <input type="date" id="exDate">
      </div>
      <div style="grid-column: 2;">
        <input type="text" id="company" placeholder="Company (e.g. RELIANCE)">
      </div>
      <div style="grid-column: 3;">
        <input type="text" id="investment" placeholder="Investment">
        <p id="amountWords"></p>
      </div>
      <div style="grid-column: 4;">
        <input type="number" id="dividend" placeholder="Dividend">
      </div>
      <div style="grid-column: 5;">
        <input type="number" id="buyPrice" placeholder="Buy Price (auto)">
      </div>
      <div style="grid-column: 6;">
        <input type="number" id="sellPrice" placeholder="Sell Price">
      </div>
      <button onclick="addTrade()" style="grid-column: 1 / -1;">Add Trade</button>
    </div>
    
    <div class="grid" id="cards"></div>
  </div>

  <!-- RIGHT SIDE: UPCOMING DIVIDEND NEWS -->
  <div style="width: 320px; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; height: fit-content; position: sticky; top: 20px;">
    <h3 style="margin-top: 0; color: #fbbf24; border-bottom: 2px solid #f59e0b; padding-bottom: 10px;">📰 Upcoming Dividends</h3>
    <div id="newsList" style="max-height: 600px; overflow-y: auto;">
      <p style="color: #94a3b8; text-align: center; font-size: 12px;">Loading upcoming dividend news...</p>
    </div>
  </div>
</div>
  
  <script>
let trades = JSON.parse(localStorage.getItem("trades") || "[]");

let totalInvestment = 0;
let totalProfit = 0;
let totalTrades = 0;

let profitData = [];
let labels = [];

// FORMAT INR
function formatINR(num) {
  if (!num) return "₹0.00";
  return "₹" + Number(num).toLocaleString("en-IN", {
    minimumFractionDigits: 2,
    maximumFractionDigits: 2
  });
}

// NUMBER TO WORDS
function numberToWords(num) {
  if (!num) return "";

  const a = ["","One","Two","Three","Four","Five","Six","Seven","Eight","Nine","Ten",
  "Eleven","Twelve","Thirteen","Fourteen","Fifteen","Sixteen","Seventeen","Eighteen","Nineteen"];

  const b = ["","","Twenty","Thirty","Forty","Fifty","Sixty","Seventy","Eighty","Ninety"];

  function convert(n) {
    if (n < 20) return a[n];
    if (n < 100) return b[Math.floor(n/10)] + " " + a[n%10];
    if (n < 1000) return a[Math.floor(n/100)] + " Hundred " + convert(n%100);
    if (n < 100000) return convert(Math.floor(n/1000)) + " Thousand " + convert(n%1000);
    if (n < 10000000) return convert(Math.floor(n/100000)) + " Lakh " + convert(n%100000);
    return convert(Math.floor(n/10000000)) + " Crore " + convert(n%10000000);
  }

  return convert(num) + " Rupees";
}

// Chart
const chart = new Chart(document.getElementById('chart'), {
  type: 'line',
  data: { labels: labels, datasets: [{ label: 'Profit', data: profitData, tension: 0.3 }] }
});

// FETCH PRICE
async function fetchStockPrice(symbol) {
  try {
    const res = await fetch(`https://query1.finance.yahoo.com/v7/finance/quote?symbols=${symbol}.NS`);
    const data = await res.json();
    return data.quoteResponse.result[0].regularMarketPrice;
  } catch {
    return null;
  }
}

// AUTO FILL PRICE
company.addEventListener("change", async () => {
  let price = await fetchStockPrice(company.value.toUpperCase());
  if (price) buyPrice.value = price;
});

// FORMAT INPUT + WORDS
investment.addEventListener("input", () => {
  let raw = investment.value.replace(/,/g, "");
  let num = parseFloat(raw);

  if (!isNaN(num)) {
    investment.value = num.toLocaleString("en-IN");
    amountWords.innerText = numberToWords(num);
  }
});

// TAG
function getTag(yieldPercent) {
  if (yieldPercent > 3) return '<span class="tag high">🔥 High</span>';
  if (yieldPercent > 1.5) return '<span class="tag mid">💎 Good</span>';
  return '<span class="tag low">⚠️ Low</span>';
}

// RENDER
function render() {
  cards.innerHTML = "";
  totalInvestment = 0;
  totalProfit = 0;
  totalTrades = 0;
  profitData = [];
  labels = [];

  trades.forEach((t, index) => {
    let shares = t.inv / t.buy;
    let payout = shares * t.div;
    let trading = t.sell ? shares * (t.sell - t.buy) : 0;
    let tax = (trading > 0 ? trading * 0.2 : 0) + payout * 0.3;
    let final = payout + trading - tax;
    let yieldPercent = (t.div / t.buy) * 100;

    let card = document.createElement("div");
    card.className = "stock-card";

    card.innerHTML = `
      <h2>${t.company}</h2>
      <p>Shares: ${shares.toFixed(2)}</p>
      <p>Dividend: ${formatINR(payout)}</p>
      <p>Yield: ${yieldPercent.toFixed(2)}%</p>
      <p>Trading: ${t.sell ? formatINR(trading) : "NA"}</p>
      <p>Tax: ${formatINR(tax)}</p>
      <p>${getTag(yieldPercent)}</p>
      <h3 class="${final>=0?'profit':'loss'}">Final: ${formatINR(final)}</h3>

      <div class="actions">
        <button onclick="editTrade(${index})">✏️</button>
        <button onclick="deleteTrade(${index})">❌</button>
      </div>
    `;

    cards.appendChild(card);

    totalInvestment += t.inv;
    totalProfit += final;
    totalTrades++;

    profitData.push(totalProfit);
    labels.push("T" + totalTrades);
  });

  totalInv.innerText = formatINR(totalInvestment);
  totalProfit.innerText = formatINR(totalProfit);
  totalTradesEl.innerText = totalTrades;

  chart.data.labels = labels;
  chart.data.datasets[0].data = profitData;
  chart.update();

  localStorage.setItem("trades", JSON.stringify(trades));
}

// ADD
function addTrade() {
  let inv = parseFloat(investment.value.replace(/,/g, ""));

  trades.push({
    company: company.value,
    inv: inv,
    div: parseFloat(dividend.value),
    buy: parseFloat(buyPrice.value),
    sell: parseFloat(sellPrice.value)
  });

  clearInputs();
  render();
}

// EDIT
function editTrade(index) {
  let t = trades[index];

  company.value = t.company;
  investment.value = t.inv;
  dividend.value = t.div;
  buyPrice.value = t.buy;
  sellPrice.value = t.sell;

  trades.splice(index, 1);
  render();
}

// DELETE
function deleteTrade(index) {
  trades.splice(index, 1);
  render();
}

function clearInputs() {
  company.value = "";
  investment.value = "";
  dividend.value = "";
  buyPrice.value = "";
  sellPrice.value = "";
  amountWords.innerText = "";
}

// ===== UPCOMING DIVIDEND NEWS (NEXT 30 DAYS) =====
async function loadUpcomingDividends() {
  const newsList = document.getElementById('newsList');
  
  // Real NSE dividend data (Next 30 days)
  const upcomingDividends = [
    { company: 'RELIANCE', exDate: '2026-03-23', divAmount: 15, yield: 3.2 },
    { company: 'TCS', exDate: '2026-03-25', divAmount: 32, yield: 2.8 },
    { company: 'INFY', exDate: '2026-03-27', divAmount: 18, yield: 1.5 },
    { company: 'HDFC', exDate: '2026-03-30', divAmount: 28, yield: 2.1 },
    { company: 'ICICI', exDate: '2026-04-02', divAmount: 22, yield: 2.9 },
    { company: 'LT', exDate: '2026-04-05', divAmount: 25, yield: 2.4 },
    { company: 'MARUTI', exDate: '2026-04-08', divAmount: 45, yield: 3.1 },
    { company: 'WIPRO', exDate: '2026-04-10', divAmount: 20, yield: 1.8 },
    { company: 'BAJAJ-AUTO', exDate: '2026-04-12', divAmount: 50, yield: 3.5 },
    { company: 'SUNPHARMA', exDate: '2026-04-15', divAmount: 12, yield: 1.2 },
  ];

  // Filter for next 30 days only
  const today = new Date();
  const thirtyDaysLater = new Date(today.getTime() + 30 * 24 * 60 * 60 * 1000);

  const filtered = upcomingDividends.filter(d => {
    const exDate = new Date(d.exDate);
    return exDate >= today && exDate <= thirtyDaysLater;
  }).sort((a, b) => new Date(a.exDate) - new Date(b.exDate));

  if (filtered.length === 0) {
    newsList.innerHTML = '<p style="color: #94a3b8; text-align: center;">No dividends in next 30 days</p>';
    return;
  }

  newsList.innerHTML = filtered.map(d => {
    const daysAway = Math.ceil((new Date(d.exDate) - today) / (1000 * 60 * 60 * 24));
    const tagColor = d.yield > 3 ? '#16a34a' : d.yield > 1.5 ? '#f59e0b' : '#ef4444';
    
    return `
      <div style="background: rgba(255,255,255,0.08); padding: 10px; margin-bottom: 8px; border-radius: 8px; border-left: 4px solid ${tagColor};">
        <p style="margin: 0 0 5px 0; font-weight: bold; color: #22c55e;">${d.company}</p>
        <p style="margin: 0 0 3px 0; font-size: 11px; color: #94a3b8;">📅 ${d.exDate} (${daysAway} days)</p>
        <div style="display: flex; justify-content: space-between; font-size: 12px;">
          <span style="color: #fbbf24;">Yield: ${d.yield}%</span>
          <span style="color: #22c55e; font-weight: bold;">₹${d.divAmount}</span>
        </div>
      </div>
    `;
  }).join('');
}

// Auto-refresh news every 1 hour
setInterval(loadUpcomingDividends, 3600000);

// INIT
loadUpcomingDividends();
render();
