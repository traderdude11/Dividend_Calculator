<!DOCTYPE html>
<html>
<head>
  <title>Dividend Intelligence Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1e293b, #0f172a);
      color: white;
      margin: 0;
      padding: 20px;
    }

    .container { max-width: 1200px; margin: auto; }

    h1 { text-align: center; margin-bottom: 20px; }

    .kpi {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 15px;
      border-radius: 15px;
    }

    .form {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
      margin-bottom: 20px;
    }

    input {
      padding: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #22c55e;
      padding: 10px;
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 15px;
    }

    .stock-card {
      background: rgba(255,255,255,0.05);
      padding: 15px;
      border-radius: 15px;
      transition: 0.3s;
    }

    .stock-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }

    .profit { color: #22c55e; }
    .loss { color: #ef4444; }

    .tag {
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 12px;
    }

    .high { background: #16a34a; }
    .mid { background: #f59e0b; }
    .low { background: #ef4444; }

    .actions {
      display: flex;
      gap: 5px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="container">

<h1>📊 Dividend Intelligence Pro</h1>

<!-- KPI -->
<div class="kpi">
  <div class="card"><h3>Total Investment</h3><h2 id="totalInv">₹0</h2></div>
  <div class="card"><h3>Total Profit</h3><h2 id="totalProfit">₹0</h2></div>
  <div class="card"><h3>Total Trades</h3><h2 id="totalTrades">0</h2></div>
</div>

<!-- FORM -->
<div class="form">
  <input type="date" id="exDate">
  <input type="text" id="company" placeholder="Company (e.g. RELIANCE)">
  <input type="number" id="investment" placeholder="Investment">
  <input type="number" id="dividend" placeholder="Dividend">
  <input type="number" id="buyPrice" placeholder="Buy Price (auto)">
  <input type="number" id="sellPrice" placeholder="Sell Price">
  <button onclick="addTrade()">Add Trade</button>
</div>

<!-- CARDS -->
<div class="grid" id="cards"></div>

<!-- CHART BELOW -->
<h2 style="margin-top:30px;">📈 Profit Growth</h2>
<div class="card">
  <canvas id="chart"></canvas>
</div>

</div>

<script>
let trades = JSON.parse(localStorage.getItem("trades") || "[]");

let totalInvestment = 0;
let totalProfit = 0;
let totalTrades = 0;

let profitData = [];
let labels = [];

// Chart
const chart = new Chart(document.getElementById('chart'), {
  type: 'line',
  data: { labels: labels, datasets: [{ label: 'Profit', data: profitData, tension: 0.3 }] }
});

// Fetch stock price
async function fetchStockPrice(symbol) {
  try {
    const res = await fetch(`https://query1.finance.yahoo.com/v7/finance/quote?symbols=${symbol}.NS`);
    const data = await res.json();
    return data.quoteResponse.result[0].regularMarketPrice;
  } catch {
    return null;
  }
}

// Auto fill price
company.addEventListener("change", async () => {
  let price = await fetchStockPrice(company.value.toUpperCase());
  if (price) buyPrice.value = price;
});

function getTag(yieldPercent) {
  if (yieldPercent > 3) return '<span class="tag high">🔥 High</span>';
  if (yieldPercent > 1.5) return '<span class="tag mid">💎 Good</span>';
  return '<span class="tag low">⚠️ Low</span>';
}

function render() {
  cards.innerHTML = "";
  totalInvestment = 0;
  totalProfit = 0;
  totalTrades = 0;
  profitData = [];
  labels = [];

  trades.forEach((t, index) => {
    let shares = t.inv / t.buy;
    let payout = shares * t.div;

    let trading = t.sell ? shares * (t.sell - t.buy) : 0;
    let tax = (trading > 0 ? trading * 0.2 : 0) + payout * 0.3;
    let final = payout + trading - tax;
    let yieldPercent = (t.div / t.buy) * 100;

    let card = document.createElement("div");
    card.className = "stock-card";

    card.innerHTML = `
      <h2>${t.company}</h2>
      <p>Shares: ${shares.toFixed(2)}</p>
      <p>Dividend: ₹${payout.toFixed(2)}</p>
      <p>Yield: ${yieldPercent.toFixed(2)}%</p>
      <p>Trading: ${t.sell ? "₹"+trading.toFixed(2) : "NA"}</p>
      <p>Tax: ₹${tax.toFixed(2)}</p>
      <p>${getTag(yieldPercent)}</p>
      <h3 class="${final>=0?'profit':'loss'}">Final: ₹${final.toFixed(2)}</h3>

      <div class="actions">
        <button onclick="editTrade(${index})">✏️</button>
        <button onclick="deleteTrade(${index})">❌</button>
      </div>
    `;

    cards.appendChild(card);

    totalInvestment += t.inv;
    totalProfit += final;
    totalTrades++;

    profitData.push(totalProfit);
    labels.push("T" + totalTrades);
  });

  totalInv.innerText = "₹" + totalInvestment.toFixed(0);
  totalProfit.innerText = "₹" + totalProfit.toFixed(0);
  totalTradesEl = document.getElementById("totalTrades");
  totalTradesEl.innerText = totalTrades;

  chart.data.labels = labels;
  chart.data.datasets[0].data = profitData;
  chart.update();

  localStorage.setItem("trades", JSON.stringify(trades));
}

function addTrade() {
  trades.push({
    company: company.value,
    inv: parseFloat(investment.value),
    div: parseFloat(dividend.value),
    buy: parseFloat(buyPrice.value),
    sell: parseFloat(sellPrice.value)
  });

  clearInputs();
  render();
}

function editTrade(index) {
  let t = trades[index];

  company.value = t.company;
  investment.value = t.inv;
  dividend.value = t.div;
  buyPrice.value = t.buy;
  sellPrice.value = t.sell;

  trades.splice(index, 1);
  render();
}

function deleteTrade(index) {
  trades.splice(index, 1);
  render();
}

function clearInputs() {
  company.value = "";
  investment.value = "";
  dividend.value = "";
  buyPrice.value = "";
  sellPrice.value = "";
}

// INIT
render();
</script>

</body>
</html>
