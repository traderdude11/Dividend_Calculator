<!DOCTYPE html>
<html>
<head>
  <title>Dividend Intelligence Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      color: white;
      min-height: 100vh;
    }

    /* HERO SECTION */
    .hero {
      background: linear-gradient(135deg, #1e40af 0%, #7c3aed 100%);
      padding: 40px 20px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
      border-bottom: 3px solid #fbbf24;
    }

    .hero h1 {
      font-size: 48px;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
      letter-spacing: 1px;
    }

    .hero p {
      font-size: 16px;
      color: #dbeafe;
      margin-bottom: 20px;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }

    .hero-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      max-width: 800px;
      margin: 30px auto 0;
    }

    .stat-box {
      background: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 12px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
      transition: 0.3s;
    }

    .stat-box:hover {
      background: rgba(255,255,255,0.15);
      transform: translateY(-5px);
    }

    .stat-box h3 {
      font-size: 12px;
      color: #dbeafe;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    .stat-box h2 {
      font-size: 28px;
      color: #fbbf24;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 30px 20px;
    }

    .section-title {
      font-size: 24px;
      color: #fbbf24;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-left: 4px solid #fbbf24;
      padding-left: 15px;
    }

    .form {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
      margin-bottom: 20px;
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    input {
      padding: 12px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.08);
      color: white;
      font-size: 14px;
      transition: 0.3s;
    }

    input:focus {
      outline: none;
      background: rgba(255,255,255,0.15);
      border-color: #fbbf24;
      box-shadow: 0 0 10px rgba(251,191,36,0.3);
    }

    input::placeholder {
      color: #94a3b8;
    }

    button {
      background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
      padding: 12px;
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      font-weight: bold;
      font-size: 15px;
      transition: 0.3s;
      box-shadow: 0 4px 15px rgba(34,197,94,0.3);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(34,197,94,0.5);
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 15px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 15px;
    }

    .stock-card {
      background: rgba(255,255,255,0.05);
      padding: 15px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      transition: 0.3s;
      border-left: 4px solid #fbbf24;
    }

    .stock-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 15px 40px rgba(0,0,0,0.4);
      border-left-color: #22c55e;
    }

    .profit {
      color: #22c55e;
      font-weight: bold;
    }

    .loss {
      color: #ef4444;
      font-weight: bold;
    }

    .tag {
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: bold;
    }

    .high {
      background: rgba(22,163,74,0.3);
      color: #22c55e;
    }

    .mid {
      background: rgba(245,158,11,0.3);
      color: #fbbf24;
    }

    .low {
      background: rgba(239,68,68,0.3);
      color: #ef4444;
    }

    .actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .actions button {
      flex: 1;
      padding: 8px;
      font-size: 14px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
    }

    .actions button:hover {
      background: rgba(255,255,255,0.2);
    }

    #amountWords {
      font-size: 12px;
      color: #fbbf24;
      margin-top: 8px;
      font-weight: bold;
    }

    .content-wrapper {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
    }

    .main-content {
      flex: 1;
    }

    .sidebar {
      width: 320px;
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      height: fit-content;
      position: sticky;
      top: 20px;
    }

    .sidebar h3 {
      margin: 0 0 15px 0;
      color: #fbbf24;
      border-bottom: 2px solid #f59e0b;
      padding-bottom: 10px;
      font-size: 16px;
    }

    #newsList {
      max-height: 600px;
      overflow-y: auto;
    }

    #newsList::-webkit-scrollbar {
      width: 6px;
    }

    #newsList::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
    }

    #newsList::-webkit-scrollbar-thumb {
      background: rgba(251,191,36,0.5);
      border-radius: 10px;
    }

    @media (max-width: 1024px) {
      .content-wrapper {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        position: static;
      }

      .hero h1 {
        font-size: 36px;
      }

      .hero-stats {
        grid-template-columns: repeat(3, 1fr);
      }
    }
  </style>
</head>

<body>

<!-- HERO SECTION -->
<div class="hero">
  <h1>📊 Dividend Intelligence Pro</h1>
  <p>Smart dividend tracking and portfolio management for Indian stocks</p>
  
  <div class="hero-stats">
    <div class="stat-box">
      <h3>Total Investment</h3>
      <h2 id="totalInv">₹0</h2>
    </div>
    <div class="stat-box">
      <h3>Total Profit</h3>
      <h2 id="totalProfit">₹0</h2>
    </div>
    <div class="stat-box">
      <h3>Total Trades</h3>
      <h2 id="totalTrades">0</h2>
    </div>
  </div>
</div>

<div class="container">
  <!-- MAIN CONTENT + SIDEBAR -->
  <div class="content-wrapper">
    <div class="main-content">
      <!-- INPUT FORM -->
      <h2 class="section-title">🎯 Add New Trade</h2>
      <div class="form">
        <div style="grid-column: 1;">
          <input type="date" id="exDate">
        </div>
        <div style="grid-column: 2;">
          <input type="text" id="company" placeholder="Company (e.g. RELIANCE)">
        </div>
        <div style="grid-column: 3;">
          <input type="text" id="investment" placeholder="Investment">
          <p id="amountWords"></p>
        </div>
        <div style="grid-column: 4;">
          <input type="number" id="dividend" placeholder="Dividend">
        </div>
        <div style="grid-column: 5;">
          <input type="number" id="buyPrice" placeholder="Buy Price (auto)">
        </div>
        <div style="grid-column: 6;">
          <input type="number" id="sellPrice" placeholder="Sell Price">
        </div>
        <button onclick="addTrade()" style="grid-column: 1 / -1;">➕ Add Trade</button>
      </div>

      <!-- TRADE CARDS -->
      <h2 class="section-title">📈 Your Trades</h2>
      <div class="grid" id="cards"></div>

      <!-- PROFIT CHART -->
      <h2 class="section-title" style="margin-top: 40px;">📊 Profit Growth Chart</h2>
      <div class="card">
        <canvas id="chart"></canvas>
      </div>
    </div>

    <!-- SIDEBAR: UPCOMING DIVIDENDS -->
    <div class="sidebar">
      <h3>🎯 Upcoming Dividends (30 days)</h3>
      <div id="newsList">
        <p style="color: #94a3b8; text-align: center; font-size: 12px;">Loading...</p>
      </div>
    </div>
  </div>
</div>

<script>
