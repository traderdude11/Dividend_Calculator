<!DOCTYPE html>
<html>
<head>
  <title>Dividend Capture Pro+</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial;
      max-width: 1100px;
      margin: auto;
      padding: 20px;
      background: #f4f6f9;
    }
    h2 { text-align: center; }
    input {
      width: 100%;
      padding: 8px;
      margin: 5px 0;
    }
    button {
      padding: 10px;
      width: 100%;
      background: #28a745;
      color: white;
      border: none;
      margin-top: 10px;
      font-size: 16px;
    }
    table {
      width: 100%;
      margin-top: 20px;
      border-collapse: collapse;
      background: white;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: center;
    }
    th {
      background: #007bff;
      color: white;
    }
    .profit { color: green; font-weight: bold; }
    .loss { color: red; font-weight: bold; }
    .warn { color: orange; font-weight: bold; }
    .summary {
      margin-top: 20px;
      padding: 15px;
      background: white;
    }
  </style>
</head>

<body>

<h2>📊 Dividend Capture Pro+</h2>

<input type="date" id="exDate">
<input type="text" id="company" placeholder="Company Name">
<input type="number" id="investment" placeholder="Investment ₹">
<input type="number" id="dividend" placeholder="Dividend ₹">
<input type="number" id="buyPrice" placeholder="Buy Price">
<input type="number" id="sellPrice" placeholder="Sell Price (leave blank if not sold)">

<button onclick="addTrade()">Add Trade</button>

<table id="table">
  <tr>
    <th title="Ex-Date of dividend">Date</th>
    <th title="Company name">Company</th>
    <th title="Shares = Investment / Buy Price">Shares</th>
    <th title="Dividend = Shares × Dividend per share">Dividend</th>
    <th title="Trading P/L = Shares × (Sell Price - Buy Price)">Trading P/L</th>
    <th title="Tax = 20% on trading profit + 30% on dividend">Total Tax</th>
    <th title="AI-based trade decision">Verdict</th>
    <th title="Final Profit/Loss after tax">Final P/L</th>
  </tr>
</table>

<div class="summary">
  <h3>📈 Portfolio Summary</h3>
  <p>Total Investment: ₹<span id="totalInv">0</span></p>
  <p>Total Profit: ₹<span id="totalProfit">0</span></p>
</div>

<script>
let totalInvestment = 0;
let totalProfit = 0;

function addTrade() {
  let date = document.getElementById("exDate").value;
  let company = document.getElementById("company").value;
  let investment = parseFloat(document.getElementById("investment").value);
  let dividend = parseFloat(document.getElementById("dividend").value);
  let buyPrice = parseFloat(document.getElementById("buyPrice").value);
  let sellPrice = parseFloat(document.getElementById("sellPrice").value);

  if (!investment || !buyPrice) {
    alert("Enter valid inputs");
    return;
  }

  let shares = investment / buyPrice;
  let payout = shares * dividend;

  let isSold = sellPrice && sellPrice > 0;

  let tradingPL = "NA";
  let totalTax = 0;
  let finalPL = "NA";
  let verdict = "NA";
  let verdictClass = "";

  if (isSold) {
    // ✅ Trading profit
    tradingPL = shares * (sellPrice - buyPrice);

    // ✅ Taxes
    let tradingTax = tradingPL > 0 ? tradingPL * 0.20 : 0;
    let dividendTax = payout * 0.30;
    totalTax = tradingTax + dividendTax;

    let totalPL = payout + tradingPL;
    finalPL = totalPL - totalTax;

    // ✅ AI Verdict
    if (finalPL > 0) {
      verdict = "Profitable ✅";
      verdictClass = "profit";
    } else if (finalPL > -1000) {
      verdict = "Risky ⚠️";
      verdictClass = "warn";
    } else {
      verdict = "Avoid ❌";
      verdictClass = "loss";
    }

  } else {
    // ❌ NOT SOLD CASE
    let dividendTax = payout * 0.30;
    totalTax = dividendTax;
  }

  let table = document.getElementById("table");

  let row = table.insertRow();
  row.innerHTML = `
    <td title="Ex-Date">${date}</td>
    <td title="Company Name">${company}</td>
    <td title="Shares = Investment / Buy Price">${shares.toFixed(0)}</td>
    <td title="Dividend = Shares × Dividend">${payout.toFixed(0)}</td>
    <td title="Trading P/L = Sell - Buy">
      ${tradingPL === "NA" ? "NA" : "₹" + tradingPL.toFixed(0)}
    </td>
    <td title="Tax = Trading Tax + Dividend Tax">₹${totalTax.toFixed(0)}</td>
    <td class="${verdictClass}" title="AI-based decision">${verdict}</td>
    <td class="${finalPL!=="NA" && finalPL>=0?'profit':'loss'}" title="Final P/L after tax">
      ${finalPL === "NA" ? "NA" : "₹" + finalPL.toFixed(0)}
    </td>
  `;

  totalInvestment += investment;
  if (finalPL !== "NA") {
    totalProfit += finalPL;
  }

  document.getElementById("totalInv").innerText = totalInvestment.toFixed(0);
  document.getElementById("totalProfit").innerText = totalProfit.toFixed(0);
}
</script>

</body>
</html>
