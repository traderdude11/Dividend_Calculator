<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dividend Calculator</title>
</head>
<body>
    <h1>Dividend Calculator</h1>
    <form id="calculator">
        <label for="amount">Investment Amount:</label>
        <input type="number" id="amount" required>

        <label for="dividend">Dividend Yield (%):</label>
        <input type="number" id="dividend" required>

        <button type="submit">Calculate</button>
    </form>

    <h2 id="result"></h2>

    <script>
        document.getElementById('calculator').onsubmit = function(event) {
            event.preventDefault();
            const amount = parseFloat(document.getElementById('amount').value);
            const dividend = parseFloat(document.getElementById('dividend').value);
            const result = (amount * (dividend / 100)).toFixed(2);
            document.getElementById('result').innerText = `Your annual dividend income: $${result}`;
        };
    </script>
</body>
</html>
