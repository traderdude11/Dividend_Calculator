<!DOCTYPE html>
<html>
<head>
  <title>Dividend Intelligence Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1e293b, #0f172a);
      color: white;
      margin: 0;
      padding: 20px;
    }

    h1 { text-align: center; }

    .layout {
      display: flex;
      gap: 20px;
    }

    .left { flex: 3; }
    .right { flex: 1; }

    .kpi {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin: 20px 0;
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 15px;
      border-radius: 15px;
    }

    .form {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
    }

    input {
      padding: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #22c55e;
      padding: 10px;
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }

    .stock-card {
      background: rgba(255,255,255,0.05);
      padding: 15px;
      border-radius: 15px;
      transition: 0.3s;
    }

    .stock-card:hover {
      transform: translateY(-6px);
    }

    .profit { color: #22c55e; }
    .loss { color: #ef4444; }

    .tag { padding: 5px 10px; border-radius: 6px; font-size: 12px; }
    .high { background: #16a34a; }
    .mid { background: #f59e0b; }
    .low { background: #ef4444; }

    .actions {
      display: flex;
      gap: 5px;
      margin-top: 10px;
    }

    #amountWords {
      font-size: 12px;
      color: #94a3b8;
    }

    #dividendList div {
      padding: 10px;
      border-bottom: 1px solid #333;
      cursor: pointer;
    }

    #dividendList div:hover {
      background: rgba(255,255,255,0.05);
    }
  </style>
</head>

<body>

<h1>📊 Dividend Intelligence Pro</h1>

<div class="layout">

<!-- LEFT -->
<div class="left">

<div class="kpi">
  <div class="card"><h3>Total Investment</h3><h2 id="totalInv">₹0</h2></div>
  <div class="card"><h3>Total Profit</h3><h2 id="totalProfit">₹0</h2></div>
  <div class="card"><h3>Total Trades</h3><h2 id="totalTrades">0</h2></div>
</div>

<div class="form">
  <input type="date" id="exDate">
  <input type="text" id="company" placeholder="Company">
  <input type="text" id="investment" placeholder="Investment">
  <p id="amountWords"></p>
  <input type="number" id="dividend" placeholder="Dividend">
  <input type="number" id="buyPrice" placeholder="Buy Price">
  <input type="number" id="sellPrice" placeholder="Sell Price">
  <button onclick="addTrade()">Add Trade</button>
</div>

<div class="grid" id="cards"></div>

<h2>📈 Profit Growth</h2>
<div class="card">
  <canvas id="chart"></canvas>
</div>

</div>

<!-- RIGHT PANEL -->
<div class="right">
  <div class="card">
    <h3>📅 Upcoming Dividends</h3>
    <div id="dividendList"></div>
  </div>
</div>

</div>

<script>
const totalInvEl = document.getElementById("totalInv");
const totalProfitEl = document.getElementById("totalProfit");
const totalTradesEl = document.getElementById("totalTrades");

let trades = JSON.parse(localStorage.getItem("trades") || "[]");
let editIndex = -1;

let profitData = [];
let labels = [];

// FORMAT
function formatINR(num) {
  return "₹" + Number(num || 0).toLocaleString("en-IN", {
    minimumFractionDigits: 2
  });
}

// WORDS
function numberToWords(num) {
  if (!num) return "";
  return num + " Rupees";
}

// CHART
const chart = new Chart(document.getElementById('chart'), {
  type: 'line',
  data: { labels: labels, datasets: [{ label: 'Profit', data: profitData }] }
});

// FETCH PRICE
async function fetchDividendData(symbol) {
  try {
    const res = await fetch(
      `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}.NS?range=1y&interval=1d&events=div`
    );

    const data = await res.json();

    let events = data.chart.result[0].events;

    if (!events || !events.dividends) return null;

    let dividends = Object.values(events.dividends);

    return dividends.map(d => ({
      date: new Date(d.date * 1000).toISOString().split("T")[0],
      amount: d.amount
    }));

  } catch {
    return null;
  }
}
}

company.addEventListener("change", async () => {
  let price = await fetchStockPrice(company.value.toUpperCase());
  if (price) buyPrice.value = price;
});

// INPUT UX
investment.addEventListener("focus", () => {
  investment.value = investment.value.replace(/,/g, "");
});
investment.addEventListener("blur", () => {
  let num = parseFloat(investment.value);
  if (!isNaN(num)) {
    investment.value = num.toLocaleString("en-IN");
    amountWords.innerText = numberToWords(num);
  }
});

// TAG
function getTag(y) {
  if (y > 3) return '<span class="tag high">🔥 High</span>';
  if (y > 1.5) return '<span class="tag mid">💎 Good</span>';
  return '<span class="tag low">⚠️ Low</span>';
}

// RENDER
function render() {
  cards.innerHTML = "";
  profitData = [];
  labels = [];

  let totalInvestment = 0, totalProfit = 0;

  trades.forEach((t, i) => {
    let shares = t.inv / t.buy;
    let payout = shares * t.div;
    let trading = t.sell ? shares * (t.sell - t.buy) : 0;
    let tax = (trading > 0 ? trading * 0.2 : 0) + payout * 0.3;
    let final = payout + trading - tax;
    let yieldPercent = (t.div / t.buy) * 100;

    let card = document.createElement("div");
    card.className = "stock-card";

    card.innerHTML = `
      <h2>${t.company}</h2>
      <p>Dividend: ${formatINR(payout)}</p>
      <p>Yield: ${yieldPercent.toFixed(2)}%</p>
      <p>${getTag(yieldPercent)}</p>
      <h3 class="${final>=0?'profit':'loss'}">${formatINR(final)}</h3>
      <div class="actions">
        <button onclick="editTrade(${i})">✏️</button>
        <button onclick="deleteTrade(${i})">❌</button>
      </div>
    `;

    cards.appendChild(card);

    totalInvestment += t.inv;
    totalProfit += final;

    profitData.push(totalProfit);
    labels.push("T" + (i+1));
  });

  totalInvEl.innerText = formatINR(totalInvestment);
  totalProfitEl.innerText = formatINR(totalProfit);
  totalTradesEl.innerText = trades.length;

  chart.data.labels = labels;
  chart.data.datasets[0].data = profitData;
  chart.update();

  localStorage.setItem("trades", JSON.stringify(trades));
}

// ADD / UPDATE
function addTrade() {
  let inv = parseFloat(investment.value.replace(/,/g, ""));
  let div = parseFloat(dividend.value);
  let buy = parseFloat(buyPrice.value);

  if (!company.value || !inv || !div || !buy) {
    alert("Fill all fields");
    return;
  }

  let obj = { company: company.value.toUpperCase(), inv, div, buy, sell: parseFloat(sellPrice.value) };

  if (editIndex >= 0) {
    trades[editIndex] = obj;
    editIndex = -1;
  } else {
    trades.push(obj);
  }

  clearInputs();
  render();
}

function editTrade(i) {
  let t = trades[i];
  company.value = t.company;
  investment.value = t.inv;
  dividend.value = t.div;
  buyPrice.value = t.buy;
  sellPrice.value = t.sell;
  editIndex = i;
}

function deleteTrade(i) {
  if (confirm("Delete trade?")) {
    trades.splice(i,1);
    render();
  }
}

function clearInputs() {
  company.value = "";
  investment.value = "";
  dividend.value = "";
  buyPrice.value = "";
  sellPrice.value = "";
  amountWords.innerText = "";
}

// RIGHT PANEL DATA
const upcomingDividends = [
  { company: "BPCL", dividend: 10, exDate: "2026-02-02" },
  { company: "RECLTD", dividend: 8, exDate: "2026-02-10" },
  { company: "IOC", dividend: 4, exDate: "2026-02-15" },
  { company: "ONGC", dividend: 12, exDate: "2026-02-20" }
];

function renderDividends() {
  let container = document.getElementById("dividendList");

  upcomingDividends.forEach(stock => {
    let div = document.createElement("div");

    div.innerHTML = `
      <b>${stock.company}</b> - ₹${stock.dividend}<br>
      <small>EX: ${stock.exDate}</small>
    `;

    div.onclick = async () => {
      company.value = stock.company;
      dividend.value = stock.dividend;
      let price = await fetchStockPrice(stock.company);
      if (price) buyPrice.value = price;
    };

    container.appendChild(div);
  });
}

// INIT
render();
renderDividends();
</script>

</body>
</html>
