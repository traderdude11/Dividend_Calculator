<!DOCTYPE html>
<html>
<head>
  <title>Dividend Intelligence Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1e293b, #0f172a);
      color: white;
      margin: 0;
      padding: 20px;
    }

    h1 { text-align: center; }

    .layout { display: flex; gap: 20px; }
    .left { flex: 3; }
    .right { flex: 1; }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 15px;
      border-radius: 15px;
    }

    .kpi {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin: 20px 0;
    }

    .form {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
    }

    input {
      padding: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #22c55e;
      padding: 10px;
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }

    .stock-card {
      background: rgba(255,255,255,0.05);
      padding: 15px;
      border-radius: 15px;
    }

    .profit { color: #22c55e; }
    .loss { color: #ef4444; }

    #amountWords {
      font-size: 12px;
      color: #94a3b8;
    }

    #dividendList div {
      padding: 10px;
      border-bottom: 1px solid #333;
      cursor: pointer;
    }

    #dividendList div:hover {
      background: rgba(255,255,255,0.05);
    }
  </style>
</head>

<body>

<h1>📊 Dividend Intelligence Pro</h1>

<div class="layout">

<!-- LEFT -->
<div class="left">

<div class="kpi">
  <div class="card"><h3>Total Investment</h3><h2 id="totalInv">₹0</h2></div>
  <div class="card"><h3>Total Profit</h3><h2 id="totalProfit">₹0</h2></div>
  <div class="card"><h3>Total Trades</h3><h2 id="totalTrades">0</h2></div>
</div>

<div class="form">
  <input type="date" id="exDate">
  <input type="text" id="company" placeholder="Company">
  <input type="text" id="investment" placeholder="Investment">
  <p id="amountWords"></p>
  <input type="number" id="dividend" placeholder="Dividend">
  <input type="number" id="buyPrice" placeholder="Buy Price">
  <input type="number" id="sellPrice" placeholder="Sell Price">
  <button onclick="addTrade()">Add Trade</button>
</div>

<div class="grid" id="cards"></div>

<h2>📈 Profit Growth</h2>
<div class="card">
  <canvas id="chart"></canvas>
</div>

</div>

<!-- RIGHT -->
<div class="right">
  <div class="card">
    <h3>📅 Upcoming Dividends</h3>
    <div id="dividendList">Loading...</div>
  </div>
</div>

</div>

<script>
const FINNHUB_API_KEY = "YOUR_API_KEY";

// ELEMENTS
const totalInvEl = document.getElementById("totalInv");
const totalProfitEl = document.getElementById("totalProfit");
const totalTradesEl = document.getElementById("totalTrades");

let trades = JSON.parse(localStorage.getItem("trades") || "[]");
let editIndex = -1;
let profitData = [];
let labels = [];

// FORMAT
function formatINR(num) {
  return "₹" + Number(num || 0).toLocaleString("en-IN", { minimumFractionDigits: 2 });
}

// WORDS
function numberToWords(num) {
  if (!num) return "";
  const a = ["","One","Two","Three","Four","Five","Six","Seven","Eight","Nine","Ten",
  "Eleven","Twelve","Thirteen","Fourteen","Fifteen","Sixteen","Seventeen","Eighteen","Nineteen"];
  const b = ["","","Twenty","Thirty","Forty","Fifty","Sixty","Seventy","Eighty","Ninety"];
  function convert(n) {
    if (n < 20) return a[n];
    if (n < 100) return b[Math.floor(n/10)] + " " + a[n%10];
    if (n < 1000) return a[Math.floor(n/100)] + " Hundred " + convert(n%100);
    if (n < 100000) return convert(Math.floor(n/1000)) + " Thousand " + convert(n%1000);
    if (n < 10000000) return convert(Math.floor(n/100000)) + " Lakh " + convert(n%100000);
    return convert(Math.floor(n/10000000)) + " Crore " + convert(n%10000000);
  }
  return convert(num) + " Rupees";
}

// CHART
const chart = new Chart(document.getElementById('chart'), {
  type: 'line',
  data: { labels: labels, datasets: [{ label: 'Profit', data: profitData }] }
});

// FETCH PRICE (Yahoo)
async function fetchStockPrice(symbol) {
  try {
    const res = await fetch(`https://query1.finance.yahoo.com/v7/finance/quote?symbols=${symbol}.NS`);
    const data = await res.json();
    return data.quoteResponse.result[0].regularMarketPrice;
  } catch {
    return null;
  }
}

// AUTO PRICE WITH RETRY
company.addEventListener("change", async () => {
  let symbol = company.value.toUpperCase();
  let price = await fetchStockPrice(symbol);

  if (!price) {
    price = await fetchStockPrice(symbol); // retry
  }

  if (price) {
    buyPrice.value = price;
  } else {
    alert("Stock price not available");
  }
});

// INPUT UX
investment.addEventListener("focus", () => {
  investment.value = investment.value.replace(/,/g, "");
});
investment.addEventListener("blur", () => {
  let num = parseFloat(investment.value);
  if (!isNaN(num)) {
    investment.value = num.toLocaleString("en-IN");
    amountWords.innerText = numberToWords(num);
  }
});

// FINNHUB DIVIDEND API
async function fetchUpcomingDividends() {
  const today = new Date().toISOString().split("T")[0];
  const nextMonth = new Date(Date.now()+30*24*60*60*1000).toISOString().split("T")[0];

  try {
    const res = await fetch(`https://finnhub.io/api/v1/calendar/dividend?from=${today}&to=${nextMonth}&token=${FINNHUB_API_KEY}`);
    const data = await res.json();
    return data.dividendCalendar || [];
  } catch {
    return [];
  }
}

// RENDER DIVIDENDS
async function renderDividends() {
  const container = document.getElementById("dividendList");
  let dividends = await fetchUpcomingDividends();

  if (!dividends.length) {
    container.innerHTML = "No data / API limit";
    return;
  }

  container.innerHTML = "";

  dividends.slice(0,15).forEach(stock => {
    let div = document.createElement("div");

    div.innerHTML = `
      <b>${stock.symbol}</b><br>
      ₹${stock.amount || "N/A"}<br>
      <small>EX: ${stock.exDate}</small>
    `;

    div.onclick = async () => {
      company.value = stock.symbol.replace(".NS","");
      dividend.value = stock.amount || "";

      let symbol = company.value;
      let price = await fetchStockPrice(symbol);

      if (!price) {
        price = await fetchStockPrice(symbol);
      }

      if (price) {
        buyPrice.value = price;
      } else {
        alert("Price fetch failed");
      }
    };

    container.appendChild(div);
  });
}

// MAIN RENDER
function render() {
  cards.innerHTML = "";
  profitData = [];
  labels = [];

  let totalInvestment = 0, totalProfit = 0;

  trades.forEach((t,i) => {
    let shares = t.inv / t.buy;
    let payout = shares * t.div;
    let trading = t.sell ? shares * (t.sell - t.buy) : 0;
    let tax = (trading>0?trading*0.2:0) + payout*0.3;
    let final = payout + trading - tax;

    let card = document.createElement("div");
    card.className="stock-card";

    card.innerHTML = `
      <h2>${t.company}</h2>
      <p>Dividend: ${formatINR(payout)}</p>
      <h3 class="${final>=0?'profit':'loss'}">${formatINR(final)}</h3>
      <button onclick="editTrade(${i})">Edit</button>
      <button onclick="deleteTrade(${i})">Delete</button>
    `;

    cards.appendChild(card);

    totalInvestment += t.inv;
    totalProfit += final;

    profitData.push(totalProfit);
    labels.push("T"+(i+1));
  });

  totalInvEl.innerText = formatINR(totalInvestment);
  totalProfitEl.innerText = formatINR(totalProfit);
  totalTradesEl.innerText = trades.length;

  chart.update();
  localStorage.setItem("trades", JSON.stringify(trades));
}

// ADD
function addTrade() {
  let inv = parseFloat(investment.value.replace(/,/g,""));
  let div = parseFloat(dividend.value);
  let buy = parseFloat(buyPrice.value);

  if (!company.value || !inv || !div || !buy) {
    alert("Fill all fields");
    return;
  }

  let obj = { company: company.value.toUpperCase(), inv, div, buy, sell: parseFloat(sellPrice.value) };

  if (editIndex>=0) {
    trades[editIndex]=obj;
    editIndex=-1;
  } else {
    trades.push(obj);
  }

  clearInputs();
  render();
}

// EDIT
function editTrade(i){
  let t=trades[i];
  company.value=t.company;
  investment.value=t.inv;
  dividend.value=t.div;
  buyPrice.value=t.buy;
  sellPrice.value=t.sell;
  editIndex=i;
}

// DELETE
function deleteTrade(i){
  if(confirm("Delete trade?")){
    trades.splice(i,1);
    render();
  }
}

// CLEAR
function clearInputs(){
  company.value="";
  investment.value="";
  dividend.value="";
  buyPrice.value="";
  sellPrice.value="";
  amountWords.innerText="";
}

// INIT
render();
renderDividends();
</script>

</body>
</html>
