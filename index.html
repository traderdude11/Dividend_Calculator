<!DOCTYPE html>
<html>
<head>
  <title>Dividend Capture Pro+</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial;
      max-width: 1300px;
      margin: auto;
      padding: 20px;
      background: #f4f6f9;
    }
    h2 { text-align: center; }

    input {
      width: 100%;
      padding: 8px;
      margin: 5px 0;
    }

    button {
      padding: 10px;
      width: 100%;
      background: #28a745;
      color: white;
      border: none;
      margin-top: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover { background: #218838; }

    table {
      width: 100%;
      margin-top: 20px;
      border-collapse: collapse;
      background: white;
      font-size: 11px;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 6px;
      text-align: center;
    }

    th {
      background: #007bff;
      color: white;
    }

    .profit { color: green; font-weight: bold; }
    .loss { color: red; font-weight: bold; }
    .warn { color: orange; font-weight: bold; }

    .summary {
      margin-top: 20px;
      padding: 15px;
      background: white;
      border-radius: 5px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .badge {
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 10px;
      color: white;
    }

    .high { background: green; }
    .mid { background: orange; }
    .low { background: red; }
  </style>
</head>

<body>

<h2>📊 Dividend Capture Pro+</h2>

<div class="top-bar">
  <button onclick="loadMarketData()">📡 Auto Fetch Dividends</button>
  <button onclick="clearAll()">🗑 Clear</button>
</div>

<input type="date" id="exDate">
<input type="text" id="company" placeholder="Company Name">
<input type="number" id="investment" placeholder="Investment ₹">
<input type="number" id="dividend" placeholder="Dividend ₹">
<input type="number" id="buyPrice" placeholder="Buy Price">
<input type="number" id="sellPrice" placeholder="Sell Price (optional)">

<button onclick="addTrade()">Add Trade</button>

<table id="table">
<tr>
  <th>Date</th>
  <th>Company</th>
  <th>Shares</th>
  <th>Buy</th>
  <th>Sell</th>
  <th>Dividend</th>
  <th>Trading</th>
  <th>Tax</th>
  <th>Tag</th>
  <th>Final</th>
</tr>
</table>

<div class="summary">
  <h3>📈 Portfolio Summary</h3>
  <p>Total Investment: ₹<span id="totalInv">0</span></p>
  <p>Total Profit: ₹<span id="totalProfit">0</span></p>
</div>

<script>
let totalInvestment = 0;
let totalProfit = 0;

// 💾 LOAD SAVED DATA
window.onload = function() {
  let saved = JSON.parse(localStorage.getItem("trades") || "[]");
  saved.forEach(trade => renderRow(trade));
};

// 📡 AUTO FETCH (Demo API)
async function loadMarketData() {
  alert("Auto fetch connected (demo). You can connect NSE API later.");
}

// 🔔 ALERT
function smartAlert(msg) {
  if (Notification.permission === "granted") {
    new Notification(msg);
  }
}
Notification.requestPermission();

function getTag(dividend) {
  if (dividend > 10) return '<span class="badge high">🔥 High</span>';
  if (dividend > 5) return '<span class="badge mid">💎 Good</span>';
  return '<span class="badge low">⚠️ Low</span>';
}

function addTrade() {
  let trade = {
    date: exDate.value,
    company: company.value,
    investment: parseFloat(investment.value),
    dividend: parseFloat(dividend.value),
    buy: parseFloat(buyPrice.value),
    sell: parseFloat(sellPrice.value)
  };

  renderRow(trade);

  let saved = JSON.parse(localStorage.getItem("trades") || "[]");
  saved.push(trade);
  localStorage.setItem("trades", JSON.stringify(saved));

  if (trade.dividend > 10) {
    smartAlert(`🔥 High dividend: ${trade.company}`);
  }

  clearInputs();
}

function renderRow(t) {
  let shares = t.investment / t.buy;
  let payout = shares * t.dividend;

  let isSold = t.sell && t.sell > 0;

  let tradingPL = isSold ? shares * (t.sell - t.buy) : 0;
  let tradingTax = tradingPL > 0 ? tradingPL * 0.20 : 0;
  let dividendTax = payout * 0.30;

  let totalTax = tradingTax + dividendTax;
  let finalPL = payout + tradingPL - totalTax;

  let row = table.insertRow();

  row.innerHTML = `
    <td>${t.date}</td>
    <td>${t.company}</td>
    <td>${shares.toFixed(2)}</td>
    <td>₹${t.buy}</td>
    <td>${isSold ? "₹"+t.sell : "NA"}</td>
    <td>₹${payout.toFixed(2)}</td>
    <td>${isSold ? "₹"+tradingPL.toFixed(2) : "NA"}</td>
    <td>₹${totalTax.toFixed(2)}</td>
    <td>${getTag(t.dividend)}</td>
    <td class="${finalPL>=0?'profit':'loss'}">₹${finalPL.toFixed(2)}</td>
  `;

  totalInvestment += t.investment;
  totalProfit += finalPL;

  totalInv.innerText = totalInvestment.toFixed(2);
  totalProfitEl = document.getElementById("totalProfit");
  totalProfitEl.innerText = totalProfit.toFixed(2);
}

function clearInputs() {
  exDate.value = "";
  company.value = "";
  investment.value = "";
  dividend.value = "";
  buyPrice.value = "";
  sellPrice.value = "";
}

function clearAll() {
  localStorage.removeItem("trades");
  location.reload();
}
</script>

</body>
</html>
