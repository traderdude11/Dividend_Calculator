<!DOCTYPE html>
<html>
<head>
  <title>Dividend Intelligence Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg,#0f172a 0%,#1e293b 50%,#0f172a 100%);
      color:white; min-height:100vh;
    }

    .hero {
      background: linear-gradient(135deg,#1e40af 0%,#7c3aed 100%);
      padding:40px 20px; text-align:center;
      box-shadow:0 10px 40px rgba(0,0,0,0.3);
      border-bottom:3px solid #fbbf24;
    }

    .hero h1 { font-size:48px; margin-bottom:10px; }
    .hero p { font-size:16px; color:#dbeafe; }

    .hero-stats {
      display:grid; grid-template-columns:repeat(3,1fr);
      gap:20px; max-width:800px; margin:30px auto 0;
    }

    .stat-box {
      background:rgba(255,255,255,0.1);
      padding:20px; border-radius:12px;
    }

    .stat-box h2 { color:#fbbf24; }

    .container { max-width:1400px; margin:auto; padding:30px 20px; }

    .section-title {
      font-size:24px; color:#fbbf24;
      margin-bottom:20px;
      border-left:4px solid #fbbf24;
      padding-left:15px;
    }

    input {
      padding:10px; margin:5px;
      border-radius:8px; border:none;
      background:rgba(255,255,255,0.1); color:white;
    }

    button {
      padding:10px; margin:5px;
      border:none; border-radius:8px;
      background:#22c55e; color:white; cursor:pointer;
    }

    .grid {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:15px;
    }

    .card, .stock-card {
      background:rgba(255,255,255,0.05);
      padding:15px; border-radius:12px;
    }

    .profit { color:#22c55e; }
    .loss { color:#ef4444; }
  </style>
</head>

<body>

<div class="hero">
  <h1>📊 Dividend Intelligence Pro</h1>
  <p>Smart dividend tracking for Indian stocks</p>

  <div class="hero-stats">
    <div class="stat-box">
      <h3>Total Investment</h3>
      <h2 id="totalInv">₹0</h2>
    </div>
    <div class="stat-box">
      <h3>Total Profit</h3>
      <h2 id="totalProfit">₹0</h2>
    </div>
    <div class="stat-box">
      <h3>Total Trades</h3>
      <h2 id="totalTrades">0</h2>
    </div>
  </div>
</div>

<div class="container">

<h2 class="section-title">🎯 Add Trade</h2>

<input id="company" placeholder="Company">
<input id="investment" placeholder="Investment">
<input id="dividend" placeholder="Dividend">
<input id="buyPrice" placeholder="Buy Price">
<input id="sellPrice" placeholder="Sell Price">

<button onclick="addTrade()">Add Trade</button>

<h2 class="section-title">📈 Trades</h2>
<div id="cards" class="grid"></div>

<h2 class="section-title">📊 Chart</h2>
<canvas id="chart"></canvas>

<!-- ================= CALCULATORS ================= -->

<h2 class="section-title">🧮 Advanced Calculators</h2>

<div class="grid">

  <div class="card">
    <h3>📊 Stock P&L</h3>
    <input id="calcBuy" placeholder="Buy Price">
    <input id="calcSell" placeholder="Sell Price">
    <input id="calcQty" placeholder="Quantity">
    <button onclick="calcPL()">Calculate</button>
    <p id="plResult"></p>
  </div>

  <div class="card">
    <h3>📈 Recovery</h3>
    <input id="calcInvested" placeholder="Invested">
    <input id="calcCurrent" placeholder="Current">
    <input id="calcRate" placeholder="% Return">
    <button onclick="calcRecovery()">Calculate</button>
    <p id="recResult"></p>
  </div>

  <div class="card">
    <h3>⚡ Intraday</h3>
    <input id="calcCapital" placeholder="Capital">
    <input id="calcLeverage" placeholder="Leverage">
    <input id="calcMove" placeholder="% Move">
    <button onclick="calcIntraday()">Calculate</button>
    <p id="intraResult"></p>
  </div>

</div>

</div>

<script>

let trades = [];

function formatINR(num){
  return "₹" + Number(num).toLocaleString("en-IN");
}

// CHART
const chart = new Chart(document.getElementById('chart'), {
  type:'line',
  data:{ labels:[], datasets:[{ label:'Profit', data:[] }] }
});

function render(){
  let totalInv=0,totalProfit=0;

  document.getElementById("cards").innerHTML="";

  trades.forEach(t=>{
    let shares=t.inv/t.buy;
    let profit=shares*(t.sell-t.buy)+shares*t.div;

    totalInv+=t.inv;
    totalProfit+=profit;

    let div=document.createElement("div");
    div.className="stock-card";
    div.innerHTML=`
      <h3>${t.company}</h3>
      <p>${formatINR(profit)}</p>
    `;
    document.getElementById("cards").appendChild(div);
  });

  document.getElementById("totalInv").innerText=formatINR(totalInv);
  document.getElementById("totalProfit").innerText=formatINR(totalProfit);
  document.getElementById("totalTrades").innerText=trades.length;

  chart.data.labels=trades.map((_,i)=>i+1);
  chart.data.datasets[0].data=trades.map(t=>t.inv);
  chart.update();
}

function addTrade(){
  let t={
    company:company.value,
    inv:parseFloat(investment.value),
    div:parseFloat(dividend.value),
    buy:parseFloat(buyPrice.value),
    sell:parseFloat(sellPrice.value)
  };
  trades.push(t);
  render();
}

/* ===== CALCULATORS ===== */

function calcPL(){
  let buy=+calcBuy.value, sell=+calcSell.value, qty=+calcQty.value;
  let p=(sell-buy)*qty;
  plResult.innerHTML=p>=0?`<span class="profit">₹${p}</span>`:`<span class="loss">₹${p}</span>`;
}

function calcRecovery(){
  let inv=+calcInvested.value, cur=+calcCurrent.value, r=+calcRate.value/100;
  let y=0;
  while(cur<inv && y<50){cur*=1+r;y++;}
  recResult.innerText="Years: "+y;
}

function calcIntraday(){
  let cap=+calcCapital.value, lev=+calcLeverage.value, mv=+calcMove.value/100;
  let pnl=cap*lev*mv;
  intraResult.innerHTML=pnl>=0?`<span class="profit">₹${pnl}</span>`:`<span class="loss">₹${pnl}</span>`;
}

render();

</script>

</body>
</html>
