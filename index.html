<!DOCTYPE html>
<html>
<head>
  <title>Dividend Intelligence Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Chart -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1e293b, #0f172a);
      color: white;
      margin: 0;
      padding: 20px;
    }

    .container { max-width: 1200px; margin: auto; }

    h1 { text-align: center; }

    .kpi {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 15px;
      border-radius: 15px;
    }

    .form {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
      margin-bottom: 20px;
    }

    input {
      padding: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #22c55e;
      padding: 12px;
      border: none;
      border-radius: 10px;
      color: white;
      cursor: pointer;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 15px;
    }

    .stock-card {
      background: rgba(255,255,255,0.05);
      padding: 15px;
      border-radius: 15px;
    }

    .profit { color: #22c55e; }
    .loss { color: #ef4444; }

    .tag {
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 12px;
    }

    .high { background: #16a34a; }
    .mid { background: #f59e0b; }
    .low { background: #ef4444; }

  </style>
</head>

<body>

<div class="container">

<h1>📊 Dividend Intelligence Pro</h1>

<!-- KPI -->
<div class="kpi">
  <div class="card"><h3>Total Investment</h3><h2 id="totalInv">₹0</h2></div>
  <div class="card"><h3>Total Profit</h3><h2 id="totalProfit">₹0</h2></div>
  <div class="card"><h3>Total Trades</h3><h2 id="totalTrades">0</h2></div>
</div>

<!-- CHART -->
<div class="card">
  <canvas id="chart"></canvas>
</div>

<!-- FORM -->
<div class="form">
  <input type="date" id="exDate">
  <input type="text" id="company" placeholder="Company (e.g. RELIANCE)">
  <input type="number" id="investment" placeholder="Investment">
  <input type="number" id="dividend" placeholder="Dividend">
  <input type="number" id="buyPrice" placeholder="Buy Price (auto)">
  <input type="number" id="sellPrice" placeholder="Sell Price">
  <button onclick="addTrade()">Add Trade</button>
</div>

<!-- CARDS -->
<div class="grid" id="cards"></div>

</div>

<script>
let totalInvestment = 0;
let totalProfit = 0;
let totalTrades = 0;

let profitData = [];
let labels = [];

// 📊 Chart
const ctx = document.getElementById('chart');
const chart = new Chart(ctx, {
  type: 'line',
  data: {
    labels: labels,
    datasets: [{
      label: 'Profit Growth',
      data: profitData,
      tension: 0.3
    }]
  }
});

// 📡 FETCH LIVE PRICE
async function fetchStockPrice(symbol) {
  try {
    const res = await fetch(`https://query1.finance.yahoo.com/v7/finance/quote?symbols=${symbol}.NS`);
    const data = await res.json();
    return data.quoteResponse.result[0].regularMarketPrice;
  } catch {
    return null;
  }
}

// AUTO FILL PRICE
company.addEventListener("change", async () => {
  let price = await fetchStockPrice(company.value.toUpperCase());
  if (price) buyPrice.value = price;
});

// TAG
function getTag(yieldPercent) {
  if (yieldPercent > 3) return '<span class="tag high">🔥 High</span>';
  if (yieldPercent > 1.5) return '<span class="tag mid">💎 Good</span>';
  return '<span class="tag low">⚠️ Low</span>';
}

// MAIN FUNCTION
function addTrade() {

  let inv = parseFloat(investment.value);
  let buy = parseFloat(buyPrice.value);
  let sell = parseFloat(sellPrice.value);
  let div = parseFloat(dividend.value);

  if (!inv || !buy || !div) {
    alert("Fill required fields");
    return;
  }

  let shares = inv / buy;
  let payout = shares * div;

  let trading = sell ? shares * (sell - buy) : 0;
  let tax = (trading > 0 ? trading * 0.2 : 0) + payout * 0.3;
  let final = payout + trading - tax;

  let yieldPercent = (div / buy) * 100;

  // CARD UI
  let card = document.createElement("div");
  card.className = "stock-card";

  card.innerHTML = `
    <h2>${company.value}</h2>
    <p>Shares: ${shares.toFixed(2)}</p>
    <p>Dividend: ₹${payout.toFixed(2)}</p>
    <p>Yield: ${yieldPercent.toFixed(2)}%</p>
    <p>Trading: ${sell ? "₹"+trading.toFixed(2) : "NA"}</p>
    <p>Tax: ₹${tax.toFixed(2)}</p>
    <p>${getTag(yieldPercent)}</p>
    <h3 class="${final>=0?'profit':'loss'}">Final: ₹${final.toFixed(2)}</h3>
  `;

  cards.appendChild(card);

  // KPI
  totalInvestment += inv;
  totalProfit += final;
  totalTrades++;

  totalInv.innerText = "₹" + totalInvestment.toFixed(0);
  totalProfit.innerText = "₹" + totalProfit.toFixed(0);
  totalTradesEl = document.getElementById("totalTrades");
  totalTradesEl.innerText = totalTrades;

  // CHART UPDATE
  profitData.push(totalProfit);
  labels.push("Trade " + totalTrades);
  chart.update();

  // ALERT
  if (yieldPercent > 3) {
    alert(`🔥 High Yield: ${company.value} (${yieldPercent.toFixed(2)}%)`);
  }

  // CLEAR
  exDate.value = "";
  company.value = "";
  investment.value = "";
  dividend.value = "";
  buyPrice.value = "";
  sellPrice.value = "";
}
</script>

</body>
</html>
